<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IZPC Advanced</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

header {
    text-align: center;
    padding: 120px 20px;
}

.logo-img {
    width: 320px;
    animation: glowFade 2s ease forwards;
}

.subtitle {
    margin-top: 15px;
    color: #aaa;
}

button {
    padding: 15px 35px;
    border: none;
    background: white;
    color: black;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #00f2fe;
}

section {
    padding: 100px 20px;
    text-align: center;
}

.card {
    display: inline-block;
    background: #111;
    padding: 35px;
    margin: 20px;
    border-radius: 15px;
    width: 260px;
}

select {
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
}

#price {
    font-size: 24px;
    margin-top: 20px;
}

footer {
    text-align: center;
    padding: 40px;
}

.footer-logo {
    width: 120px;
}

@keyframes glowFade {
    from { opacity:0; transform:scale(0.8);} 
    to { opacity:1; transform:scale(1);} 
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
<img src="./logo.png" class="logo-img">
<div class="subtitle">IZPC : New Era of Computer</div>
<br>
<button onclick="scrollToSection()">시작하기</button>
</header>

<section id="services">
<h2>서비스</h2>
<div class="card">💻 맞춤 PC</div>
<div class="card">🛠️ 조립</div>
<div class="card">🚀 배송</div>
</section>

<section>
<h2>견적 짜기</h2>

<select id="cpu">
<option value="20">i5 10400</option>
<option value="40">i7 10700</option>
<option value="80">i9 10900K</option>
</select>

<select id="gpu">
<option value="40">RTX 4060</option>
<option value="80">RTX 4070</option>
<option value="300">RTX 4090</option>
</select>

<select id="ram">
<option value="32">16GB</option>
<option value="64">32GB</option>
<option value="128">64GB</option>
</select>

<br>
<button onclick="calcPrice()">가격 계산</button>

<div id="price">총 가격: 0만원</div>
</section>

<footer>
<img src="./logo2.png" class="footer-logo">
<p>© 2026 IZPC</p>
</footer>

<script>
function scrollToSection() {
    document.getElementById("services").scrollIntoView({behavior:"smooth"});
}

function calcPrice() {
    let cpu = parseInt(document.getElementById("cpu").value);
    let gpu = parseInt(document.getElementById("gpu").value);
    let ram = parseInt(document.getElementById("ram").value);

    let total = cpu + gpu + ram;

    document.getElementById("price").innerText = "총 가격: " + total + "만원";
}

// 파티클 배경
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: (Math.random() - 0.5),
        dy: (Math.random() - 0.5)
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'white';

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
